# Coach tips — shown in the right rail of the Overview page.
# One is picked at random each visit. Keep tips short (1–2 sentences).
# These should be practical, friendly, and about how to use AAP Start — not HR advice.

- "Modules don't have to be done in one sitting. Your progress is always saved."
- "The Resource Hub is always available — even after onboarding is complete."
- "If something in a module isn't clear, HR is your best first stop."
- "You can revisit any completed module at any time. There's no penalty for reviewing."
- "Take your time on acknowledgements — they reflect real expectations, not just checkboxes."
- "The quiz requires 100% to pass, but you have unlimited attempts. No pressure."
- "Not sure where to start? Work through the modules in order — they build on each other."
- "Your overview page always shows where you are and what's next."
- "AAP Start stays open after your first week. Bookmark it for quick access to resources."
- "Found a resource that would help a coworker? You can point them to the Resource Hub directly."
- "Your track determines which modules you see — but the core content applies to everyone."
- "Coming soon modules will unlock as content is added. Check back as you progress."
