# Login scenes — shown in the left panel of the login page.
# Each scene scrolls vertically, giving new hires something to read while they log in.
#
# Fields:
#   id        Unique identifier (kebab-case)
#   headline  Large bold headline. Use \n for line breaks.
#   subtext   Smaller supporting line, shown below the headline.
#   body      Optional additional paragraph (smaller, dimmer text).
#             Remove or leave blank if not needed.
#
# DRAFT — Review and edit all copy before publishing.
# These scenes are a great place to tell your story, reinforce your values,
# and set the tone for the new hire experience.

- id: welcome
  headline: "Ready for day one?\nYou are now."
  subtext: "AAP Start guides you through everything you need to know before you hit the ground running."
  body: "Work through modules at your own pace. Your progress is always saved."

- id: who-we-are
  headline: "Serving pharmacies.\nStrengthening communities."
  subtext: "AAP has been a trusted partner to independent pharmacies for decades — and you're now part of that mission."
  body: "Our members depend on us to deliver consistent, high-quality support. That starts with a team that shows up ready."

- id: values
  headline: "Where good people\ndo great work."
  subtext: "Integrity, accountability, and care for one another — these aren't slogans. They're how we operate every day."

- id: what-to-expect
  headline: "A few modules.\nA stronger start."
  subtext: "AAP Start covers the things that matter most: who we are, how we work, how to stay safe, and where to find help."
  body: "Most employees complete their core modules in a few hours. Take your time — there's no rush."

- id: support
  headline: "You won't be\nfiguring it out alone."
  subtext: "Your supervisor and HR are both here to support you. AAP Start is a tool, not a replacement for real conversations."
  body: "Nicole Thornton, HR Manager, is your go-to for anything HR-related. Don't hesitate to reach out."
